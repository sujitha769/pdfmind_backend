spring.application.name=curriculumai
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Secrets are read from environment variables, never hardcoded here.
# Locally: set these in your IDE's Run Configuration (IntelliJ: Edit
# Configurations -> Environment Variables) or a .env file loaded by
# your shell before running the app.
# On Render: set these in the service's Environment tab in the dashboard.

groq.api.key=${GROQ_API_KEY}
hf.api.key=${HF_API_KEY}

qdrant.url=${QDRANT_URL:http://localhost:6333}
qdrant.api.key=${QDRANT_API_KEY:}